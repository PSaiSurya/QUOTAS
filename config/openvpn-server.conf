port 1194
proto udp
dev tun
ca /etc/openvpn/certs/ca.crt
cert /etc/openvpn/certs/server.crt
key /etc/openvpn/certs/server.key
dh none
server 10.8.0.0 255.255.255.0
topology subnet
push "route 10.0.20.0 255.255.255.0"
tls-server
tls-version-min 1.3
tls-groups mlkem1024
cipher AES-256-GCM
keepalive 10 60
persist-key
persist-tun
verb 3